name: Build Executable (reusable)

on:
  workflow_call:
    inputs:
      publish:
        description: 'Publicar como GitHub Release com auto-update?'
        required: false
        default: 'false'
        type: string
    secrets:
      GH_TOKEN:
        required: true
      GH_READ_TOKEN:
        required: false

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout repo do projeto
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create _build folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "_build"

      - name: Copy project files to _build
        shell: pwsh
        run: |
          # dist/ — obrigatorio
          if (Test-Path "dist") {
            Copy-Item -Recurse -Force "dist" "_build\dist"
            Write-Host "dist/ copiado"
          } else {
            Write-Error "ERRO: pasta dist/ nao encontrada. Verifique o script de build."
            exit 1
          }

          # public/ — opcional
          if (Test-Path "public") {
            Copy-Item -Recurse -Force "public" "_build\public"
            Write-Host "public/ copiado"
          }

          # src/assets/ — opcional
          if (Test-Path "src\assets") {
            New-Item -ItemType Directory -Force -Path "_build\src"
            Copy-Item -Recurse -Force "src\assets" "_build\src\assets"
            Write-Host "src/assets/ copiado"
          }

          # data/ — opcional
          if (Test-Path "data") {
            Copy-Item -Recurse -Force "data" "_build\data"
            Write-Host "data/ copiado"
          }

          # server.js — obrigatorio
          if (Test-Path "server.js") {
            Copy-Item -Force "server.js" "_build\server.js"
            Write-Host "server.js copiado"
          } else {
            Write-Error "ERRO: server.js nao encontrado na raiz do projeto."
            exit 1
          }

          # Icone — prefere .png, fallback .ico
          if (Test-Path "icon.png") {
            Copy-Item -Force "icon.png" "_build\icon.png"
            Write-Host "icon.png copiado"
          } elseif (Test-Path "icon.ico") {
            magick "icon.ico[0]" -resize 256x256 "_build\icon.png"
            Write-Host "icon.png gerado a partir do icon.ico"
          } else {
            Write-Host "Nenhum icone encontrado, usando padrao do Electron"
          }

      - name: Write main.js
        shell: pwsh
        run: |
          @'
          import { app, BrowserWindow, dialog, shell } from "electron";
          import { createRequire } from "module";
          import path from "path";
          import fs from "fs";
          import { fileURLToPath } from "url";

          const require = createRequire(import.meta.url);
          const { autoUpdater } = require("electron-updater");
          const log = require("electron-log");

          const __dirname = path.dirname(fileURLToPath(import.meta.url));

          const gotLock = app.requestSingleInstanceLock();
          if (!gotLock) { app.quit(); }

          log.transports.file.level = "info";
          autoUpdater.logger = log;

          const appRoot      = __dirname;
          const userDataPath = app.getPath("userData");
          const PORT         = 3000;

          if (!fs.existsSync(userDataPath)) fs.mkdirSync(userDataPath, { recursive: true });

          async function startServer() {
            process.env.PORT      = String(PORT);
            process.env.APP_ROOT  = appRoot;
            process.env.DATA_DIR  = userDataPath;
            process.env.DIST_PATH = path.join(appRoot, "dist");
            process.env.NODE_ENV  = "production";

            return new Promise(async (resolve, reject) => {
              try {
                await import(new URL("./server.js", import.meta.url).href);

                let retries = 40;
                const http = require("http");
                const wait = () => {
                  const req = http.get("http://localhost:" + PORT, res => {
                    res.resume();
                    log.info("Server ready on port " + PORT);
                    resolve();
                  });
                  req.on("error", () => {
                    if (--retries <= 0) return reject(new Error("Server did not start on port " + PORT));
                    setTimeout(wait, 500);
                  });
                  req.end();
                };
                setTimeout(wait, 300);
              } catch (err) {
                reject(err);
              }
            });
          }

          let win = null;

          function createWindow() {
            win = new BrowserWindow({
              width: 1280, height: 720,
              minWidth: 800, minHeight: 600,
              show: false, autoHideMenuBar: true,
              webPreferences: { nodeIntegration: false, contextIsolation: true, sandbox: true },
            });
            win.loadURL("http://localhost:" + PORT);
            win.once("ready-to-show", () => win.show());
            win.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url); return { action: "deny" };
            });
          }

          function setupAutoUpdater() {
            autoUpdater.autoDownload = false;
            const readToken = "__GH_READ_TOKEN__";
            if (readToken) {
              autoUpdater.addAuthHeader(`token ${readToken}`);
              autoUpdater.requestHeaders = { Authorization: `token ${readToken}` };
            }
            autoUpdater.on("update-available", info => {
              dialog.showMessageBox(win, {
                type: "info", title: "Atualizacao disponivel",
                message: "Versao " + info.version + " disponivel.",
                detail: "Deseja baixar agora?",
                buttons: ["Baixar", "Depois"], defaultId: 0, cancelId: 1,
              }).then(({ response }) => { if (response === 0) autoUpdater.downloadUpdate(); });
            });
            autoUpdater.on("download-progress", p => {
              if (win && !win.isDestroyed()) {
                win.setTitle("Baixando... " + Math.round(p.percent) + "%");
                win.setProgressBar(p.percent / 100);
              }
            });
            autoUpdater.on("update-downloaded", info => {
              if (win && !win.isDestroyed()) { win.setTitle(app.name); win.setProgressBar(-1); }
              dialog.showMessageBox(win, {
                type: "question", title: "Atualizacao pronta",
                message: "Versao " + info.version + " pronta.",
                detail: "Reiniciar agora?",
                buttons: ["Reiniciar", "Depois"], defaultId: 0, cancelId: 1,
              }).then(({ response }) => { if (response === 0) autoUpdater.quitAndInstall(false, true); });
            });
            autoUpdater.on("error", err => log.error("updater error:", err.message));
            setTimeout(() => autoUpdater.checkForUpdates(), 3000);
          }

          app.whenReady().then(async () => {
            try {
              await startServer();
              createWindow();
              if (app.isPackaged) setupAutoUpdater();
              app.on("activate", () => {
                if (BrowserWindow.getAllWindows().length === 0) createWindow();
              });
            } catch (err) {
              log.error("startup failed:", err);
              dialog.showErrorBox("Erro ao iniciar", String(err.message));
              app.quit();
            }
          });

          app.on("second-instance", () => {
            if (win) { if (win.isMinimized()) win.restore(); win.focus(); }
          });
          app.on("window-all-closed", () => {
            if (process.platform !== "darwin") app.quit();
          });
          '@ | Set-Content "_build\main.js"

      - name: Inject GH_READ_TOKEN into main.js
        shell: pwsh
        env:
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
        run: |
          $token = if ($env:GH_READ_TOKEN) { $env:GH_READ_TOKEN } else { "" }
          (Get-Content "_build\main.js" -Raw) -replace '__GH_READ_TOKEN__', $token | Set-Content "_build\main.js"
          Write-Host "Token injetado: $($token.Length -gt 0 ? 'sim' : 'nao (repo publico)')"

      - name: Write electron-builder.yml
        shell: pwsh
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.0.0' }}
        run: |
          $appId   = "com.$($env:REPO_OWNER.ToLower() -replace '[^a-z0-9]','').$($env:REPO_NAME.ToLower() -replace '[^a-z0-9]','')"
          $hasIcon = Test-Path "_build\icon.png"

          $yml = @"
          appId: $appId
          productName: $($env:REPO_NAME)
          electronUpdaterCompatibility: ">= 2.16"
          directories:
            output: release
          files:
            - "**/*"
            - "!release/**"
            - "!*.yml"
          asar: false
          win:
            target:
              - target: nsis
                arch: [x64]
          nsis:
            oneClick: false
            perMachine: false
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: true
            createStartMenuShortcut: true
          publish:
            - provider: github
              owner: $($env:REPO_OWNER)
              repo: $($env:REPO_NAME)
              releaseType: release
          "@

          if ($hasIcon) {
            $yml = "icon: icon.png`n" + $yml
            $yml = $yml -replace '(win:\n)', "win:`n  icon: icon.png`n"
          }

          $yml | Set-Content "_build\electron-builder.yml"
          Write-Host "=== electron-builder.yml ==="
          Get-Content "_build\electron-builder.yml"

      - name: Write package.json
        shell: pwsh
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1.0.0' }}
        run: |
          $version = $env:APP_VERSION -replace '^v',''
          $name    = $env:REPO_NAME.ToLower() -replace '[^a-z0-9\-]','-'
          $gamePkg = Get-Content "package.json" | ConvertFrom-Json
          $deps    = if ($gamePkg.dependencies) { $gamePkg.dependencies } else { @{} }
          $newPkg  = [ordered]@{
            name         = $name
            version      = $version
            description  = $env:REPO_NAME
            main         = "main.js"
            type         = "module"
            author       = $env:REPO_OWNER
            license      = "MIT"
            dependencies = $deps
          }
          $newPkg | ConvertTo-Json -Depth 10 | Set-Content "_build\package.json"

      - name: Install dependencies in _build
        working-directory: _build
        shell: pwsh
        run: |
          npm install
          npm install --save-dev electron electron-builder
          npm install electron-updater electron-log
          Write-Host "electron-updater: $(Test-Path 'node_modules\electron-updater')"
          Write-Host "electron-log:     $(Test-Path 'node_modules\electron-log')"

      - name: Build Windows installer
        working-directory: _build
        run: npx electron-builder --win --publish ${{ (github.ref_type == 'tag' || inputs.publish == 'true') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: _build/release/*.exe
          retention-days: 30
